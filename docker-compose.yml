services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: betterads
      MYSQL_ROOT_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      # Defaults point at this compose file's own mysql/redis/rabbitmq
      # containers. Populate .env (see .env.example) to point at real
      # hosted services instead — every var below is overridable.
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:mysql://mysql:3306/betterads}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-pass}
      SPRING_RABBITMQ_HOST: ${SPRING_RABBITMQ_HOST:-rabbitmq}
      SPRING_RABBITMQ_PORT: ${SPRING_RABBITMQ_PORT:-5672}
      SPRING_RABBITMQ_USERNAME: ${SPRING_RABBITMQ_USERNAME:-guest}
      SPRING_RABBITMQ_PASSWORD: ${SPRING_RABBITMQ_PASSWORD:-guest}
      SPRING_RABBITMQ_VIRTUAL_HOST: ${SPRING_RABBITMQ_VIRTUAL_HOST:-/}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT:-6379}
      SPRING_DATA_REDIS_PASSWORD: ${SPRING_DATA_REDIS_PASSWORD:-}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      APP_S3_BUCKET: ${APP_S3_BUCKET:-betterads-local-dev}
      APP_S3_REGION: ${APP_S3_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      APP_UPLOAD_MAX_SIZE_BYTES: ${APP_UPLOAD_MAX_SIZE_BYTES:-209715200}
      APP_AUTH_JWT_SECRET: ${APP_AUTH_JWT_SECRET:-my-super-secret-jwt-key-change-this-in-production}
      APP_AUTH_JWT_EXPIRATION_MS: ${APP_AUTH_JWT_EXPIRATION_MS:-900000}
      APP_AUTH_REFRESH_EXPIRATION_MS: ${APP_AUTH_REFRESH_EXPIRATION_MS:-604800000}
      APP_AUTH_RESET_EXPIRATION_MS: ${APP_AUTH_RESET_EXPIRATION_MS:-1800000}
      APP_STRIPE_SECRET_KEY: ${APP_STRIPE_SECRET_KEY:-}
      APP_STRIPE_WEBHOOK_SECRET: ${APP_STRIPE_WEBHOOK_SECRET:-}
      APP_STRIPE_MAX_FUNDING_AMOUNT: ${APP_STRIPE_MAX_FUNDING_AMOUNT:-100000}
      APP_FRAUD_MAX_CAMPAIGN_VIEWS_PER_MINUTE: ${APP_FRAUD_MAX_CAMPAIGN_VIEWS_PER_MINUTE:-200}
      APP_FRAUD_MAX_FUNDING_ATTEMPTS_PER_HOUR: ${APP_FRAUD_MAX_FUNDING_ATTEMPTS_PER_HOUR:-5}
      APP_SECURITY_TRUSTED_PROXIES: ${APP_SECURITY_TRUSTED_PROXIES:-}
      APP_AI_PROVIDER: ${APP_AI_PROVIDER:-mock}
      APP_AI_LOCAL_BASE_URL: ${APP_AI_LOCAL_BASE_URL:-http://localhost:9000}
      APP_RATELIMIT_ENABLED: ${APP_RATELIMIT_ENABLED:-true}
      APP_RATELIMIT_REQUESTS_PER_MINUTE: ${APP_RATELIMIT_REQUESTS_PER_MINUTE:-100}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:4200}
      APP_CORS_ALLOWED_METHODS: ${APP_CORS_ALLOWED_METHODS:-GET,POST,PUT,DELETE,OPTIONS,PATCH}
      APP_CORS_ALLOWED_HEADERS: ${APP_CORS_ALLOWED_HEADERS:-*}
      APP_CORS_EXPOSED_HEADERS: ${APP_CORS_EXPOSED_HEADERS:-Authorization,X-Rate-Limit-Remaining}
      APP_CORS_ALLOW_CREDENTIALS: ${APP_CORS_ALLOW_CREDENTIALS:-true}
      APP_CORS_MAX_AGE: ${APP_CORS_MAX_AGE:-3600}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  mysql_data:
  rabbitmq_data:
