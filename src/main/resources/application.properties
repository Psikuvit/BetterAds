spring.application.name=BetterAds

# Never leak stack traces/exception messages via Spring Boot's default error
# handling (belt-and-suspenders alongside GlobalExceptionHandler)
spring.web.error.include-message=never

# Base URL used in generated embed links
app.base-url=http://localhost:8080

# MySQL (override via SPRING_DATASOURCE_URL / _USERNAME / _PASSWORD env vars
# for a real/hosted DB instead of editing this file — see .env.example)
spring.datasource.url=jdbc:mysql://localhost:3306/betterads
spring.datasource.username=root
spring.datasource.password=pass
spring.jpa.hibernate.ddl-auto=none

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672

# Redis (override via SPRING_DATA_REDIS_HOST / _PORT / _PASSWORD env vars
# for a real/hosted Redis instead of editing this file — see .env.example)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# S3 (must be non-blank — StorageService fails fast at startup otherwise)
app.s3.bucket=betterads
app.s3.region=eu-north-1

# Upload validation
app.upload.max-size-bytes=209715200

# Stripe (blank by default — campaign funding logs a startup warning until set)
app.stripe.secret-key=
app.stripe.webhook-secret=
app.stripe.max-funding-amount=100000

# Fraud / abuse limits
app.fraud.max-campaign-views-per-minute=200
app.fraud.max-funding-attempts-per-hour=5
app.security.trusted-proxies=

# Placement / SDK session API (Phase 1 of the iframe -> SDK migration)
app.placements.session-ttl-minutes=15
app.placements.min-viewability-ms=2000
# Dedicated secret for session tokens — deliberately does NOT fall back to
# app.auth.jwt-secret, so rotating one doesn't silently affect the other.
app.fraud.session-token-secret=change-this-session-token-secret-in-prod

# CDN signed delivery (Phase 3 — blank/disabled by default, degrades to S3
# presigned URLs; see CdnSigningService)
app.cdn.enabled=false
app.cdn.domain=
app.cdn.key-pair-id=
app.cdn.private-key-path=

# Server-driven ad selection (Phase 6 — frequency capping)
app.placements.frequency-cap-window-hours=24
app.placements.frequency-cap-max-views-per-window=3

# Validation
app.validation.endpoint=

# AI provider: mock (default) | local | huggingface
app.ai.provider=huggingface
app.ai.local-base-url=http://localhost:9000
app.ai.huggingface.space-url=https://3amizoubir-ad-moderation.hf.space
app.ai.huggingface.translation-space-url=https://3amizoubir-translator.hf.space

# JWT Auth
app.auth.jwt-secret=my-super-secret-jwt-key-change-this-in-production
app.auth.jwt-expiration-ms=900000
app.auth.refresh-expiration-ms=604800000
app.auth.reset-expiration-ms=1800000

# Rate Limiting
app.ratelimit.enabled=true
app.ratelimit.requests-per-minute=100

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:4200
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
app.cors.allowed-headers=*
app.cors.exposed-headers=Authorization,X-Rate-Limit-Remaining
app.cors.allow-credentials=true
app.cors.max-age=3600

# Logging
logging.level.me.psikuvit.betterads=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n
logging.file.name=logs/betterads.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.total-size-cap=100MB
logging.logback.rollingpolicy.max-history=7
