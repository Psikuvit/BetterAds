spring.application.name=BetterAds

# Base URL used in generated embed links
app.base-url=http://localhost:8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/betterads
spring.datasource.username=root
spring.datasource.password=pass
spring.jpa.hibernate.ddl-auto=none

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# S3
app.s3.bucket=
app.s3.region=us-east-1

# Validation
app.validation.endpoint=

# AI provider: mock (default) | local
app.ai.provider=mock
app.ai.local-base-url=http://localhost:9000

# JWT Auth
app.auth.jwt-secret=my-super-secret-jwt-key-change-this-in-production
app.auth.jwt-expiration-ms=86400000

# Rate Limiting
app.ratelimit.enabled=true
app.ratelimit.requests-per-minute=100

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:4200
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
app.cors.allowed-headers=*
app.cors.exposed-headers=Authorization,X-Rate-Limit-Remaining
app.cors.allow-credentials=true
app.cors.max-age=3600

# Logging
logging.level.me.psikuvit.betterads=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n
logging.file.name=logs/betterads.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.total-size-cap=100MB
logging.logback.rollingpolicy.max-history=7
